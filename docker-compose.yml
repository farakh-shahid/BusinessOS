services:
  db:
    image: postgres:16-alpine
    container_name: businessos-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: businessos
      POSTGRES_PASSWORD: businessos
      POSTGRES_DB: businessos
    volumes:
      - businessos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U businessos -d businessos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  businessos_pgdata:
